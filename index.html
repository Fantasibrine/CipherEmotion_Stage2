<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CipherEmotions</title>
    <style>
        :root {
            --primary: #8B5CF6;
            --secondary: #10B981;
            --bg: #0A0E17;
            --text: #F9FAFB;
            --muted: #9CA3AF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Inter, system-ui, sans-serif;
        }

        body {

            background:
                radial-gradient(circle at 20% 20%, #3B0764 0%, transparent 40%),
                radial-gradient(circle at 80% 30%, #064E3B 0%, transparent 40%),
                linear-gradient(135deg, #1E0A2E, #0A0E17);

            color: var(--text);
            min-height: 100vh;

        }

        /* NAVBAR */

        .navbar {

            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 20px 8%;

            border-bottom: 1px solid rgba(255, 255, 255, 0.05);

        }

        .logo {

            font-weight: 700;
            font-size: 1.2rem;

        }

        nav a {

            color: #d1d5db;
            margin-left: 25px;
            text-decoration: none;
            font-size: .9rem;
            transition: .25s;

        }

        nav a:hover {
            color: white;
        }


        /* HERO */

        .hero {

            text-align: center;
            padding: 80px 20px;
            max-width: 900px;
            margin: auto;

        }

        .hero h1 {

            font-size: 3rem;
            margin-bottom: 15px;

            background: linear-gradient(90deg, #8B5CF6, #10B981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

        }

        .hero-sub {

            color: var(--muted);
            font-size: 1rem;
            line-height: 1.6;

        }


        /* INTERFACE */

        .cipher-interface {

            display: none;

            max-width: 800px;
            margin: 40px auto;
            padding: 30px;

            background: rgba(31, 41, 55, 0.6);
            backdrop-filter: blur(10px);

            border-radius: 16px;

            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .cipher-interface h2 {

            text-align: center;
            margin-bottom: 20px;

        }


        /* TEXTAREA */

        textarea {

            width: 100%;
            min-height: 120px;

            background: #111827;

            border: 2px solid #374151;

            border-radius: 12px;

            padding: 15px;

            color: #d1d5db;

            font-size: .95rem;

            resize: none;

            transition: .25s;

        }

        textarea:focus {

            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(139, 92, 246, .4);

        }


        /* BUTTONS */

        .actions {

            display: flex;
            gap: 15px;
            margin: 20px 0;

        }

        button {

            flex: 1;
            padding: 13px;

            border: none;
            border-radius: 10px;

            font-weight: 600;
            color: white;

            cursor: pointer;

            transition: .25s;

        }

        .btn-enc {
            background: linear-gradient(135deg, #8B5CF6, #7C3AED);
        }

        .btn-dec {
            background: linear-gradient(135deg, #10B981, #059669);
        }

        button:hover {

            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, .35);

        }

        button:disabled {

            background: #111;
            opacity: .6;

        }


        /* OUTPUT */

        .result-area {

            background: #111827;

            border-radius: 12px;

            padding: 20px;

            position: relative;

            border: 1px solid #374151;

            min-height: 80px;

        }

        .tag {

            position: absolute;

            top: -10px;
            left: 15px;

            background: #0A0E17;

            padding: 3px 10px;

            font-size: .7rem;

            border-radius: 6px;

            color: #9CA3AF;

            border: 1px solid #374151;

        }

        #output {

            line-height: 1.5;
            word-break: break-word;

        }


        /* STATUS */

        #status {

            font-size: .8rem;
            text-align: center;

            margin-top: 10px;

            color: #FB7185;

            font-weight: 600;

            min-height: 1.2em;

        }


        /* EMOTION BARS */

        .emotion-bar {

            display: flex;
            align-items: center;

            margin: 7px 0;

            font-size: .85rem;

        }

        .emotion-label {

            width: 90px;
            font-weight: 600;

        }

        .bar-container {

            flex: 1;
            height: 9px;

            background: #1f2937;

            border-radius: 5px;

            overflow: hidden;

            margin-right: 8px;

        }

        .bar-fill {

            height: 100%;

            width: 0%;

            background: linear-gradient(90deg, var(--primary), var(--secondary));

            transition: width 1.2s;

        }

        .percent {

            width: 35px;
            text-align: right;

            font-size: .8rem;
            color: #9CA3AF;

        }


        /* FOOTER */

        footer {

            margin-top: 60px;

            text-align: center;

            padding: 20px;

            font-size: .8rem;

            color: #9CA3AF;

            border-top: 1px solid rgba(255, 255, 255, 0.05);

        }


        /* MOBILE */

        @media(max-width:700px) {

            .hero h1 {
                font-size: 2.2rem;
            }

            .actions {
                flex-direction: column;
            }

            .navbar {
                padding: 20px 5%;
            }

        }

        .get-started {

            margin-top: 30px;
            padding: 14px 28px;

            border: none;
            border-radius: 10px;

            background: linear-gradient(135deg, #8B5CF6, #10B981);

            color: white;
            font-weight: 600;
            font-size: .95rem;

            cursor: pointer;

            transition: .25s;

        }

        .get-started:hover {

            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, .35);

        }

        .cipher-interface.show {

            display: block;
            animation: fadeUp .6s ease;

        }

        @keyframes fadeUp {

            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }

        }

        /* NAVBAR */

        .navbar {

            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 20px 8%;

            border-bottom: 1px solid rgba(255, 255, 255, 0.05);

        }

        .nav-links {

            display: flex;
            gap: 25px;

        }

        .nav-links a {

            text-decoration: none;
            color: #d1d5db;
            font-size: .9rem;

            transition: .25s;

        }

        .nav-links a:hover {
            color: white;
        }

        /* HAMBURGER ICON */

        .hamburger {

            display: none;
            font-size: 1.8rem;
            cursor: pointer;

        }

        /* MOBILE */

        @media(max-width:768px) {

            .nav-links {

                position: absolute;

                top: 70px;
                right: 0;

                background: #0A0E17;

                flex-direction: column;

                width: 200px;

                padding: 20px;

                display: none;

                border-left: 1px solid rgba(255, 255, 255, 0.05);

            }

            .nav-links a {
                margin: 10px 0;
            }

            .nav-links.active {
                display: flex;
            }

            .hamburger {
                display: block;
            }

        }
    </style>
</head>

<body>

    <header class="navbar">
        <div class="logo">🔐 EmotionCipher</div>

        <nav class="nav-links" id="navLinks">
            <a href="index.html">Home</a>
            <a href="technology.html">Technology</a>
            <a href="security.html">Security</a>
            <a href="about.html">About</a>
        </nav>

        <div class="hamburger" onclick="toggleMenu()">☰</div>
    </header>


    <section class="hero">

        <h1>AI Emotion Cipher</h1>

        <p class="hero-sub">
            AI-powered privacy-preserving communication.
            Encrypt messages while preserving emotional intelligence.
        </p>

        <button onclick="goToCipher()" class="get-started">
            Get Started
        </button>

    </section>


    <section class="cipher-interface">

        <h2>Encrypt or Decrypt Message</h2>

        <textarea id="input" placeholder="Enter message to encrypt OR token to decrypt..."></textarea>

        <div id="status"></div>

        <div class="actions">

            <button id="encBtn" class="btn-enc" onclick="runAIEncryption()">Encrypt</button>

            <button id="decBtn" class="btn-dec" onclick="runDecryption()">Decrypt</button>

        </div>

        <div class="result-area">

            <span class="tag">Output</span>

            <div id="output">Waiting for input...</div>

        </div>

    </section>


    <footer>

        <p>EmotionCipher AI • Privacy-Preserving Communication</p>

    </footer>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>

        const MODEL_URL = "/api/emotion";

        const SUPABASE_URL = "https://dmabbvhzuyjifpjxmyxf.supabase.co/";
        const SUPABASE_KEY = "sb_publishable_0eFiuFZ57jYSd83SvNIaeA_6O4Kr02n";

        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const SECRET_KEY = "CipherEmotionHackathonSecret";

        function generateToken() {

            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
            let token = "EC-";

            for (let i = 0; i < 6; i++) {
                token += chars[Math.floor(Math.random() * chars.length)];
            }

            return token;
        }

        function setStatus(message) {

            const status = document.getElementById("status");

            status.style.opacity = 0;

            setTimeout(() => {
                status.innerText = message;
                status.style.opacity = 1;
            }, 150);

        }

        async function queryAI(text) {

            const response = await fetch(MODEL_URL, {
                headers: { "Content-Type": "application/json" },
                method: "POST",
                body: JSON.stringify({
                    inputs: text,
                    options: { wait_for_model: true }
                })
            });

            const result = await response.json();

            return result[0]
                .map(e => ({
                    label: e.label.toUpperCase(),
                    percent: Math.round(e.score * 100)
                }))
                .sort((a, b) => b.percent - a.percent);
        }

        async function getKey() {

            const encoder = new TextEncoder();

            const hash = await crypto.subtle.digest(
                "SHA-256",
                encoder.encode(SECRET_KEY)
            );

            return crypto.subtle.importKey(
                "raw",
                hash,
                { name: "AES-GCM" },
                false,
                ["encrypt", "decrypt"]
            );
        }

        function bufferToBase64(buffer) {
            return btoa(String.fromCharCode(...new Uint8Array(buffer)));
        }

        function base64ToBuffer(base64) {
            return Uint8Array.from(atob(base64), c => c.charCodeAt(0));
        }

        async function encryptAES(payload) {

            const encoder = new TextEncoder();
            const key = await getKey();

            const iv = crypto.getRandomValues(new Uint8Array(12));

            const encrypted = await crypto.subtle.encrypt(
                { name: "AES-GCM", iv: iv },
                key,
                encoder.encode(payload)
            );

            const combined = new Uint8Array(iv.length + encrypted.byteLength);

            combined.set(iv, 0);
            combined.set(new Uint8Array(encrypted), iv.length);

            return bufferToBase64(combined);
        }

        async function decryptAES(cipher) {

            const decoder = new TextDecoder();

            const data = base64ToBuffer(cipher);

            const iv = data.slice(0, 12);
            const encrypted = data.slice(12);

            const key = await getKey();

            const decrypted = await crypto.subtle.decrypt(
                { name: "AES-GCM", iv: iv },
                key,
                encrypted
            );

            return decoder.decode(decrypted);
        }

        async function runAIEncryption() {

            const encBtn = document.getElementById("encBtn");
            encBtn.disabled = true;

            const text = document.getElementById("input").value.trim();

            if (!text) {
                alert("Enter message");
                encBtn.disabled = false;
                return;
            }

            try {

                setStatus("AI is analyzing emotion...");

                const emotions = await queryAI(text);

                setStatus("Encrypting message...");

                const emotionJSON = JSON.stringify(emotions);

                const payload = emotionJSON + "|" + text;

                const cipher = await encryptAES(payload);

                const token = generateToken();

                const { error } = await db
                    .from("ciphers")
                    .insert({ token: token, cipher: cipher });

                if (error) {
                    console.error(error);
                    alert(error.message);
                    encBtn.disabled = false;
                    return;
                }

                setStatus("Encryption successful.");

                let barsHTML = "<br><strong>Emotion Redistribution:</strong>";

                emotions.forEach((e, i) => {

                    barsHTML += `
<div class="emotion-bar">
<div class="emotion-label">${e.label}</div>
<div class="bar-container">
<div class="bar-fill" id="bar${i}"></div>
</div>
<div class="percent">${e.percent}%</div>
</div>
`;

                });

                const output = document.getElementById("output");

                output.innerHTML = `
<strong>Cipher Token:</strong> ${token}
${barsHTML}
`;

                setTimeout(() => {

                    emotions.forEach((e, i) => {

                        const bar = document.getElementById(`bar${i}`);
                        if (bar) bar.style.width = e.percent + "%";

                    });

                }, 100);

            }

            catch (err) {

                console.error(err);
                setStatus("Encryption failed");

            }

            finally {

                encBtn.disabled = false;

            }

        }

        async function runDecryption() {

            const decBtn = document.getElementById("decBtn");
            decBtn.disabled = true;

            const token = document.getElementById("input").value.trim();

            if (!token) {
                alert("Enter token");
                decBtn.disabled = false;
                return;
            }

            try {

                setStatus("Fetching cipher from database...");

                const { data, error } = await db
                    .from("ciphers")
                    .select("cipher")
                    .eq("token", token)
                    .single();

                if (error || !data) {
                    setStatus("Token not found");
                    decBtn.disabled = false;
                    return;
                }

                setStatus("Decrypting message...");

                const payload = await decryptAES(data.cipher);

                const splitIndex = payload.indexOf("|");

                const emotions = JSON.parse(payload.substring(0, splitIndex));

                const message = payload.substring(splitIndex + 1);

                setStatus("Decryption successful.");

                let barsHTML = "<br><strong>Emotion Redistribution:</strong>";

                emotions.forEach((e, i) => {

                    barsHTML += `
<div class="emotion-bar">
<div class="emotion-label">${e.label}</div>
<div class="bar-container">
<div class="bar-fill" id="bar${i}"></div>
</div>
<div class="percent">${e.percent}%</div>
</div>
`;

                });

                const output = document.getElementById("output");

                output.innerHTML = `
<strong>Message:</strong> ${message}
${barsHTML}
`;

                setTimeout(() => {

                    emotions.forEach((e, i) => {

                        const bar = document.getElementById(`bar${i}`);
                        if (bar) bar.style.width = e.percent + "%";

                    });

                }, 100);

            }

            catch (err) {

                console.error(err);
                setStatus("Decryption failed");

            }

            finally {

                decBtn.disabled = false;

            }

        }

        function goToCipher() {

            const section = document.querySelector(".cipher-interface");

            section.classList.add("show");

            section.scrollIntoView({
                behavior: "smooth"
            });

        }

        function toggleMenu() {

            const nav = document.getElementById("navLinks");

            nav.classList.toggle("active");

        }

    </script>
</body>


</html>
